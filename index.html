<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Marie's Weather App</title>
</head>
<body>
<div class="weather-app">
     <header>
      <form class="search-form">
        <input type="search" placeholder="Enter a city.." required class="search-form-input" />
        <input type="submit" value="Search" class="search-form-button"/>
      </form>
    </header>
    <main>
      <div class="weather-app-data">
        <h1 class="weather-app-city">Paris</h1>
        <p class="weather-app-details">
          Tuesday 14:49, scattered clouds
          <br />
          Humidity: 66%, Wind: 3.13km/h
        </p>
      </div>
      <div class="weather-app-temperature-container">
        <div class="weather-app-icon">🌤️</div>
         <div class="weather-app-temperature">12</div>
         <div class="weather-class-unit">°C</div>
    </main>
   <footer>Coded by
    <a href="https://github.com/Meraia">Marie Storkova</a>, code open-sourced on
    <a href="https://github.com/Meraia?tab=repositories"> GitHub</a>, and website hosted on
    <a href="https://mariesweatherapplication.netlify.app/">Netlify</a>
</footer>
</div>
</body>
</html>
